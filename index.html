  <script>
    const products = [
      { id:1, name:"Alimento Balanceado para Perros", desc:"Nutrición completa para perros de todas las edades con proteínas de alta calidad. Formulado con ingredientes naturales seleccionados que promueven la salud digestiva, un pelaje brillante y energía sostenida durante todo el día.\n\nComponentes principales: Carne de pollo deshidratada (25%), arroz integral, avena, harina de pescado, grasas omega-3 y omega-6.\n\nIngredientes: Proteína cruda mín. 22%, grasa cruda 10%, fibra máx. 4%, ceniza máx. 8%. Enriquecido con vitaminas A, D3, E y minerales esenciales para fortalecer inmunidad y salud ósea.", price:450, img:"https://lh3.googleusercontent.com/d/1ycDnr1U4W1vlfzQoVv3uDgBbBWTn2UzA", category:"perros", badge:"Disponible" },
      { id:2, name:"Snacks de Pollo para Perros", desc:"Bocados horneados con pollo real, ideales para entrenamiento y recompensas. Sin colorantes artificiales ni conservantes, perfectos para premiar a tu mascota de forma saludable.\n\nComponentes: 100% pechuga de pollo deshidratada, sin harinas ni rellenos.\n\nIngredientes: Proteína de pollo 85%, grasas naturales 8%, fibra 2%. Libre de gluten, maíz y soya. Horneado a baja temperatura para preservar nutrientes. Recomendado como golosina ocasional representando no más del 10% de la ingesta calórica diaria.", price:85, img:"https://lh3.googleusercontent.com/d/1vWvA_ei8QiFmXjiQf02BaFxBC_sh8YCT", category:"perros", badge:"Nuevo" },
      { id:3, name:"Sticks de Fresa y Crema con Pollo", desc:"Snacks innovadores que combinan proteína de pollo con fresa y crema. Una combinación única de sabores que encantará a tu perro mientras le aporta nutrientes esenciales.\n\nComponentes: Pollo deshidratado, crema natural, fresa liofilizada, almidón de patata.\n\nIngredientes: Proteína de pollo 70%, lácteos naturales 15%, fresa 5%, almidón 8%, antioxidantes naturales. Bajo en grasas. Ideal para perros mayores o con digestión sensible. Tamaño perfecto para diarios de entrenamiento y juego.", price:95, img:"https://lh3.googleusercontent.com/d/14YrUNVODkkPUUt13alyLfXPudAvVLtw", category:"perros", badge:"Nuevo" },
      { id:4, name:"Alimento Premium para Gatos", desc:"Recetas gourmet con pescado y proteínas seleccionadas, libre de gluten. Diseñado para satisfacer los paladares más exigentes mientras cuida la salud renal y el peso ideal de tu gato.\n\nComponentes: Harina de salmón (30%), pollo deshidratado, aceite de pescado, taurina, minerales para salud urinaria.\n\nIngredientes: Proteína cruda mín. 38%, grasa cruda 12%, fibra máx. 3%, ceniza máx. 7%. Enriquecido con taurina (aminoácido esencial felino), vitaminas del complejo B y zinc para soporte inmunológico. Fórmula balanceada para mantener peso ideal.", price:380, img:"https://lh3.googleusercontent.com/d/1EFowNc9R_kflPJ889UtgqaOSdZUFqh5z", category:"gatos", badge:"Disponible" },
      { id:5, name:"Snacks Dentales para Gatos", desc:"Bocados crujientes para limpieza dental con menta y extractos naturales. Ayudan a prevenir la acumulación de sarro y mantienen el aliento fresco de tu felino.\n\nComponentes: Fibra de caña de azúcar, pollo deshidratado, extracto de menta, alga marina.\n\nIngredientes: Proteína 15%, fibra 35%, grasas 5%. Textura abrasiva que actúa mecánicamente limpiando dientes y encías. Extracto de menta proporciona aliento fresco. Sin azúcares ni colorantes. Uso diario recomendado para gatos adultos.", price:75, img:"https://lh3.googleusercontent.com/d/1iLK2bCA6ypzat6pyIMFn630KTJ8A7sb5", category:"gatos", badge:"Disponible" },
      { id:6, name:"Suplemento Multivitamínico", desc:"Tabletas masticables que fortalecen defensas, piel y pelaje. Fórmula veterinaria con vitaminas A, D, E y complejo B para el bienestar integral de perros y gatos.\n\nComponentes: Vitamina A 50,000 IU, vitamina D3 5,000 IU, vitamina E 100 IU, complejo B (B1, B2, B6, B12), zinc, selenio.\n\nIngredientes: Sabor a carne, celulosa microcristalina, estearato de magnesio. Dosis recomendada: 1 tableta por cada 10kg de peso corporal diariamente. Apoyo inmunológico especial durante cambios de estación o estrés. Seguro para cachorros y gatos jóvenes.", price:220, img:"https://lh3.googleusercontent.com/d/1P7GQM023heFoqAUF0gyTLT1LN3SNIuR", category:"ambos", badge:"Disponible" },
      { id:7, name:"Shampoo para Mascotas", desc:"Fórmula suave con ingredientes naturales para un pelaje brillante y aroma fresco. Ideal para pieles sensibles, libre de parabenos y sulfatos agresivos.\n\nComponentes: Aceite de coco virgen, aloe vera, extracto de avena, chamomila, manzanilla.\n\nIngredientes: pH equilibrado 6.5-7.0, espumante natural, proteínas de seda hidrolizadas. Libre de parabenos, sulfatos SLS, ftalatos. Dermatológicamente testado. Hidrata y nutre mientras limpia suavemente. Apto para baños frecuentes. Aroma natural duradero.", price:145, img:"https://lh3.googleusercontent.com/d/1X2HypwSC3ZoBn5aKIJ3jKtgRrFCBUWld", category:"ambos", badge:"Disponible" },
      { id:8, name:"Desparasitante WormAway", desc:"Tabletas de amplio espectro para perros y cachorros, controla 4 tipos de parásitos intestinales. Fácil administración y resultados efectivos desde la primera dosis.\n\nComponentes: Principios activos contra Toxocara, Ancylostoma, Trichuris y Diphylidium. Excipientes de calidad farmacéutica.\n\nIngredientes: Levamisol 40mg, Pyrantel pamoate 30mg, Fenbendazol 20mg. Dosis: 1 tableta por cada 10kg peso. Eficacia demostrada en 48-72 horas. Seguro para cachorros desde 6 semanas. Recomendado cada 3 meses en perros adultos, mensual en cachorros.", price:180, img:"https://lh3.googleusercontent.com/d/1A7acearSY_Jsys6c7XXe90H0KcfpcbyF", category:"perros", badge:"Disponible" }
    ];

    function fmtPrice(n) { return 'L ' + n.toLocaleString('es-HN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
    let cart = JSON.parse(localStorage.getItem('vittapet_cart') || '[]');

    function navigate(section) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById('sec-' + section).classList.add('active');
      window.scrollTo(0, 0);
    }

    function renderProducts() {
      const search = document.getElementById('search-input').value.toLowerCase();
      const filter = document.getElementById('filter-select').value;
      const grid = document.getElementById('products-grid');
      const filtered = products.filter(p => {
        const matchSearch = p.name.toLowerCase().includes(search) || p.desc.toLowerCase().includes(search);
        const matchFilter = filter === 'all' || p.category === filter;
        return matchSearch && matchFilter;
      });
      grid.innerHTML = filtered.map(p => `
        <div class="card-product bg-white rounded-2xl overflow-hidden shadow-sm border-2 border-gray-100 hover:border-amber-200" onclick="openProductModal(${p.id})">
          <div class="relative aspect-square bg-gray-50 flex items-center justify-center p-4">
            <img src="${p.img}" alt="${p.name}" class="max-w-full max-h-full object-contain">
            <span class="absolute top-3 right-3 text-xs text-white font-semibold px-2.5 py-1 rounded-full ${p.badge==='Nuevo'?'badge-new':'badge-available'}">${p.badge}</span>
          </div>
          <div class="p-4">
            <h3 class="font-semibold text-sm mb-1 line-clamp-2">${p.name}</h3>
            <p class="text-xs text-gray-500 mb-3 line-clamp-2">${p.desc}</p>
            <div class="flex items-center justify-between">
              <span class="font-bold text-purple-600">${fmtPrice(p.price)}</span>
              <button onclick="event.stopPropagation();addToCart(${p.id})" class="btn-primary px-3 py-1.5 bg-yellow-400 hover:bg-yellow-500 text-gray-900 text-xs font-semibold rounded-full">Agregar</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function openProductModal(id) {
      const p = products.find(pr => pr.id === id);
      if (!p) return;
      document.getElementById('modal-img').src = p.img;
      document.getElementById('modal-img').alt = p.name;
      document.getElementById('modal-name').textContent = p.name;
      document.getElementById('modal-desc').textContent = p.desc;
      document.getElementById('modal-price').textContent = fmtPrice(p.price);
      const badge = document.getElementById('modal-badge');
      badge.textContent = p.badge;
      badge.className = 'inline-block text-xs text-white font-semibold px-3 py-1 rounded-full mb-4 w-fit ' + (p.badge === 'Nuevo' ? 'badge-new' : 'badge-available');
      document.getElementById('modal-add-btn').onclick = () => { addToCart(p.id); closeProductModal(); };
      document.getElementById('product-modal').classList.remove('hidden');
    }

    function closeProductModal() {
      document.getElementById('product-modal').classList.add('hidden');
    }

    function addToCart(id) {
      const existing = cart.find(i => i.id === id);
      if (existing) { existing.qty++; } else { cart.push({ id, qty: 1 }); }
      saveCart();
    }
    function removeFromCart(id) { cart = cart.filter(i => i.id !== id); saveCart(); }
    function updateQty(id, delta) { const item = cart.find(i => i.id === id); if (item) { item.qty = Math.max(1, item.qty + delta); } saveCart(); }
    function saveCart() { localStorage.setItem('vittapet_cart', JSON.stringify(cart)); updateCartUI(); }

    function updateCartUI() {
      const badge = document.getElementById('cart-badge');
      const totalQty = cart.reduce((s, i) => s + i.qty, 0);
      badge.textContent = totalQty;
      badge.classList.toggle('hidden', totalQty === 0);
      const container = document.getElementById('cart-items');
      const empty = document.getElementById('cart-empty');
      const footer = document.getElementById('cart-footer');
      if (cart.length === 0) { container.innerHTML = ''; empty.classList.remove('hidden'); footer.classList.add('hidden'); return; }
      empty.classList.add('hidden'); footer.classList.remove('hidden');
      container.innerHTML = cart.map(item => {
        const p = products.find(pr => pr.id === item.id);
        return `<div class="flex gap-3 items-center bg-cyan-50 rounded-xl p-3">
          <img src="${p.img}" class="w-14 h-14 rounded-xl object-contain bg-white" alt="${p.name}">
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium truncate">${p.name}</p>
            <p class="text-xs text-gray-500">${fmtPrice(p.price)}</p>
            <div class="flex items-center gap-2 mt-1">
              <button onclick="updateQty(${p.id},-1)" class="w-6 h-6 bg-gray-200 rounded-full text-sm flex items-center justify-center hover:bg-gray-300">−</button>
              <span class="text-sm font-medium">${item.qty}</span>
              <button onclick="updateQty(${p.id},1)" class="w-6 h-6 bg-gray-200 rounded-full text-sm flex items-center justify-center hover:bg-gray-300">+</button>
            </div>
          </div>
          <button onclick="removeFromCart(${p.id})" class="text-red-400 hover:text-red-600 p-1"><i data-lucide="trash-2" style="width:16px;height:16px"></i></button>
        </div>`;
      }).join('');
      lucide.createIcons();
      const total = cart.reduce((s, i) => { const p = products.find(pr => pr.id === i.id); return s + p.price * i.qty; }, 0);
      document.getElementById('cart-total').textContent = fmtPrice(total);
    }

    function toggleCart() {
      const overlay = document.getElementById('cart-overlay');
      const panel = document.getElementById('cart-panel');
      const isOpen = panel.classList.contains('open');
      if (isOpen) { panel.classList.remove('open'); overlay.classList.add('hidden'); overlay.style.opacity='0'; }
      else { overlay.classList.remove('hidden'); setTimeout(()=>overlay.style.opacity='1',10); panel.classList.add('open'); }
    }

    function checkout() {
      if (cart.length === 0) return;
      let msg = 'Hola VittaPet,\n\nMe gustaría solicitar cotización/reserva de los siguientes productos:\n\n';
      let total = 0;
      cart.forEach(item => {
        const p = products.find(pr => pr.id === item.id);
        const sub = p.price * item.qty;
        total += sub;
        msg += `• ${p.name} — Cant: ${item.qty} — ${fmtPrice(sub)}\n`;
      });
      msg += `\nTotal referencial: ${fmtPrice(total)}\n\nMe confirmas disponibilidad y proximos pasos por favor. Muchas gracias.`;
      window.open('https://wa.me/50497223433?text=' + encodeURIComponent(msg), '_blank');
    }

    document.getElementById('contact-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('c-name').value || 'Cliente';
      const email = document.getElementById('c-email').value || '';
      const contactMsg = document.getElementById('c-msg').value || '';
      const msg = `Hola VittaPet,\n\nNombre: ${name}\nCorreo: ${email}\n\nMensaje:\n${contactMsg}`;
      window.open('https://wa.me/50497223433?text=' + encodeURIComponent(msg), '_blank');
      this.classList.add('hidden');
      document.getElementById('contact-success').classList.remove('hidden');
      setTimeout(() => { this.classList.remove('hidden'); this.reset(); document.getElementById('contact-success').classList.add('hidden'); }, 3000);
    });

    renderProducts();
    updateCartUI();
    lucide.createIcons();
  </script>
